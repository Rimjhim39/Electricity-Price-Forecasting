<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Price Forecast</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ⚡ Background Effects -->
<div class="lightning"></div>
<div class="grid"></div>
<div class="sparks"></div>
<div class="particles"></div>

<div class="container">

    <h1>⚡ Short Term Electricity Price Forecast</h1>

    <div class="card form-card">

        <div class="form-group">
            <label>Select Date</label>
            <input type="date" id="date">
        </div>

        <div class="form-group">
            <label>Horizon (Hours)</label>
            <input type="number" id="horizon" value="24" min="1" max="48">
        </div>

        <button onclick="predict()">⚡ Predict</button>

    </div>


    <div class="card chart-card">
        <canvas id="priceChart" width="900" height="400"></canvas>
    </div>


    <div id="recommendation" class="card recommendation-card"></div>


    <div class="card table-card">

        <h3>Hourly Predicted Prices</h3>

        <table id="priceTable">

            <thead>
                <tr>
                    <th>Hour</th>
                    <th>Price (₹)</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
